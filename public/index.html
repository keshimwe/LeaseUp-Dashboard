<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Lease-Up Dashboard</title>
      <link rel="stylesheet" href="style.css"/>
   </head>
 <body>
    
    <header>
      <h1>Lease-Up Dashboard</h1>
    </header>
  <main>
    <section class="container">
      <div id="searchbar" class="searchbar">
        <input type="text" placeholder=" unit number.. status...">
        <button>Search</button>
       
      </div>
        <div id="unitstatus" class="unitstatus">
            <button class="button" data-status="all"> All</button>
            <button class="button" data-status="leased"> Leased</button>
            <button class="button" data-status="vacant"> Vacant</button>
            <button class="button" data-status="notice"> Notice</button>
           
        </div>
        
        <div class="dashboard-header">
            <h3 class="unit"> Unit</h3>
            <h3 class="status"> Status</h3>
            <h3 class="edit"> Edit</h3>
        </div>

        <div id="unit-dashboard" class="unit-dashboard"></div>
      
    </section>
  </main>



  <script src="script.js"></script>
 </body>
</html>
