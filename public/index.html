<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Lease-Up Dashboard</title>
      <link rel="stylesheet" href="style.css"/>
   </head>
 <body>
    
    <header>
      <h1>Lease-Up Dashboard</h1>
    </header>
  <main>
    <section class="container">
      <div id="searchbar" class="searchbar">
        <input type="text" placeholder=" unit number.. status...">
        <button>Search</button>
       
      </div>
        <div id="unitstatus" class="unitstatus">
            <h3 class="all"> All</h3>
            <h3 class="leased"> Leased</h3>
            <h3 class="vacant"> Vacant</h3>
            <h3 class="notice"> Notice</h3>
        </div>
        
        <div id="dasboard" class="dashboard">
            <h3 class="unit"> Unit</h3>
            <h3 class="status"> Status</h3>
            <h3 class="edit"> Edit</h3>
        </div>
      
    </section>
  </main>



  <script src="public\script.js"></script>
 </body>
</html>
