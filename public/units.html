<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Details Page</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <header>
        <nav>
            <a href="http://localhost:5050/"> &larr; Back to Dashboard</a>
        </nav>
        <!--<h1>Unit Details </h1>m-->
    </header>

    <div id="unit-details" class="unit-details">
        <h3>Unit Summary</h3>
        <!--Unit info -->
    </div>
         
        <!--- Applicant Section -->
    <div class="applicant" id="applicant">
                <h3>Applicant Summary</h3>
        

               <div id="applicant-list">

               </div>
                <div class="action-btn" id="action-btn">
                    <button class="add-btn" id="add-btn">Add</button>
                    
                </div>     

        <div id="applicant-form" style="display: none;"> 
                <input type="text" id="applicant-name" placeholder="Applicant name">
                
            <select id="new-app-status">
                <option value="select">Select</option>
                <option value="application-received">Application Received</option>
                <option value="screening">Screening</option>
                <option value="approved">Approved</option>
                <option value="denied">Denied</option>
                <option value="withdrew">Withdrew</option>
            </select>
               <button class="confirm-add" id="confirm-add">Add</button>
        </div>

               
    </div> 

    <div class="notes" id ="notes">
        <h3>Notes</h3>
        <textarea class="note-input" id="note-input" ></textarea><br>
        <button class="note-submit" id="note-submit">Submit</button>
    </div>

    <div id="notes-saved"></div>

    <button id="save-btn" class="save-btn">Save Changes</button>

<script src="units.js"></script>
</body>
</html>
