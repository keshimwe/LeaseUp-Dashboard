<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Lease-Up Dashboard</title>
      <link rel="stylesheet" href="style.css"/>
   </head>
 <body>
    
    <header>
      <h1>Lease-Up Dashboard</h1>
    </header>
  <main>
    <section class="container">
      <div id="searchbar" class="searchbar">
        <input type="text" id="search-input" placeholder=" unit number....">
        <button class="search-btn" id="search-btn"> Search</button>
       
      </div>
        <div id="unitstatus" class="unitstatus">
            <button class="button" id="all"> All</button>
            <button class="button" id="leased"> Leased</button>
            <button class="button" id="vacant"> Vacant</button>
            <button class="button" id="notice"> Notice</button>
           
        </div>
        

        <table>
          <thead >
            <tr class="dashboard-header">
              <th class="unit"> Unit</th>
              <th class="status"> Status</th>
              <th class="edit"> Edit</th>
            </tr>
          </thead>
          
          <tbody id="unit-dashboard" >
          </tbody>
        </table>
    </section>
  </main>



  <script src="script.js"></script>
 </body>
</html>
