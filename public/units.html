<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Details Page</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <header>
        <nav>
            <a href="http://localhost:5050/"> &larr; Back to Dashboard</a>
        </nav>
        <!--<h1>Unit Details </h1>m-->
    </header>

    <div id="unit-details" class="unit-details">
       
        <!--Unit info -->
    </div>
         
        <!--- Applicant Section -->
    <div class="applicant-section" id="applicant-section">
              <h3>Applicant Summary</h3>
              
              
               <div id="applicant-list" class="applicant-list"></div>
               
                <div class="action-btn" id="action-btn">
                    <h3>Action Item</h3><br>
                    
                    <button class="add-btn" id="add-btn">Add Applicant</button><br>
                    <button class="edit-btn">Edit</button>
                </div> 
     
        <div id="applicant-form" class="applicant-form" style="display: none;">
          <div class="form-pop"> 
                  <span>Enter Name</span><br>
                <input class="applicant-name" type="text" id="applicant-name" placeholder="Applicant name">  <br>
                
                <span>Select Status</span><br>
            <select id="new-app-status">
                <option value="select">Select</option>
                <option value="application-received">Application Received</option>
                <option value="screening">Screening</option>
                <option value="approved">Approved</option>
                <option value="denied">Denied</option>
                <option value="withdrew">Withdrew</option>
            </select>
               <div class="confirm-btn">
                 <button class="confirm-add" id="confirm-add">Add</button>      
                </div>
          </div>
        </div>
    </div>
      
            
        <div class="notes-container" id ="notes">
            <div class ="notes-action">
                <h3>Notes</h3><br>
          
                <textarea class="note-input" id="note-input" ></textarea><br>
                <button class="note-submit" id="note-submit">Submit</button>
            </div>
        

           <div id="notes-saved"></div>
        </div>
   
          <div class="save-btn">
            <button id="save-btn" class="save-btn">Save Changes</button>
          </div>

<script src="units.js"></script>
</body>
</html>
